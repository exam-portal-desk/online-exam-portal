<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Out</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --indigo: #6366f1;
            --purple: #a855f7;
            --green:  #38ef7d;
            --bg:     #080c1e;
            --card:   rgba(14,20,48,0.96);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* ── Deep space background ──────────────────── */
        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Nebula glow blobs */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.18;
        }
        .nebula-1 { width:500px; height:400px; background:#4f46e5; top:-120px; left:-100px; animation: drift1 12s ease-in-out infinite; }
        .nebula-2 { width:400px; height:500px; background:#7c3aed; bottom:-150px; right:-80px;  animation: drift2 15s ease-in-out infinite; }
        .nebula-3 { width:300px; height:300px; background:#059669; bottom:10%;  left:20%;       animation: drift1 10s ease-in-out infinite reverse; }

        @keyframes drift1 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(30px,-20px) scale(1.08); }
        }
        @keyframes drift2 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(-25px,15px) scale(1.06); }
        }

        /* Stars */
        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 70% 35%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 90% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 35% 45%, rgba(255,255,255,0.5) 0%, transparent 100%);
            background-size: 600px 600px;
            animation: twinkle 6s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0%   { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Grid lines */
        .grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* ── Card ───────────────────────────────────── */
        .card {
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid rgba(99,102,241,0.22);
            border-radius: 28px;
            padding: 3rem 3.5rem;
            text-align: center;
            max-width: 440px;
            width: 90%;
            box-shadow:
                0 0 0 1px rgba(168,85,247,0.08),
                0 50px 100px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.04);
            animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
            overflow: hidden;
        }

        /* Top shimmer line */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--indigo), var(--purple), transparent);
            animation: topLine 3s ease-in-out infinite;
        }

        @keyframes topLine {
            0%,100% { opacity: 0.5; transform: scaleX(0.7); }
            50%      { opacity: 1;   transform: scaleX(1); }
        }

        @keyframes cardIn {
            from { opacity:0; transform:scale(0.8) translateY(40px); }
            to   { opacity:1; transform:scale(1) translateY(0); }
        }

        /* ── Lock icon ──────────────────────────────── */
        .icon-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.8rem;
        }

        .icon-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .ring-1 { border-top-color: var(--indigo); animation: spin1 1.6s ease-in-out infinite; }
        .ring-2 { inset:10px; border-left-color: var(--purple); animation: spin2 1.1s linear infinite reverse; }
        .ring-3 { inset:20px; border-bottom-color: var(--green); animation: spin1 0.8s linear infinite; }

        @keyframes spin1 { to { transform:rotate(360deg); } }
        @keyframes spin2 { to { transform:rotate(360deg); } }

        .icon-core {
            position: absolute;
            inset: 28px;
            background: radial-gradient(circle, rgba(99,102,241,0.5), rgba(168,85,247,0.3), transparent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        .lock-svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: rgba(165,180,252,0.9);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes pulse {
            0%,100% { transform:scale(1);   opacity:0.8; }
            50%      { transform:scale(1.2); opacity:1;   }
        }

        /* ── Title & subtitle ───────────────────────── */
        .title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 50%, #86efac 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.45rem;
        }

        .subtitle {
            color: #475569;
            font-size: 0.875rem;
            letter-spacing: 0.01em;
        }

        /* ── Progress bar ───────────────────────────── */
        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 99px;
            margin: 1.8rem 0 1.4rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--indigo), var(--purple), var(--green));
            border-radius: 99px;
            animation: fillUp 1.6s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        @keyframes fillUp {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }

        /* ── Status items ───────────────────────────── */
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            text-align: left;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.8rem;
            font-family: 'DM Mono', monospace;
            color: #334155;
            padding: 0.45rem 0.8rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.35s ease;
        }

        .status-item.visible {
            opacity: 1;
            transform: translateX(0);
            color: #94a3b8;
            border-color: rgba(99,102,241,0.12);
            background: rgba(99,102,241,0.04);
        }

        .status-item.done {
            color: #86efac;
            border-color: rgba(56,239,125,0.15);
            background: rgba(56,239,125,0.04);
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #334155;
            flex-shrink: 0;
            transition: background 0.35s ease, box-shadow 0.35s ease;
        }

        .status-item.visible .status-dot { background: var(--indigo); }
        .status-item.done    .status-dot {
            background: var(--green);
            box-shadow: 0 0 6px rgba(56,239,125,0.7);
        }
    </style>
</head>
<body>

<div class="bg-layer">
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>
    <div class="stars"></div>
    <div class="grid"></div>
</div>

<div class="card">
    <div class="icon-wrap">
        <div class="icon-ring ring-1"></div>
        <div class="icon-ring ring-2"></div>
        <div class="icon-ring ring-3"></div>
        <div class="icon-core">
            <!-- lock icon -->
            <svg class="lock-svg" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
    </div>

    <div class="title">Session Secured</div>
    <div class="subtitle">Clearing credentials &amp; redirecting you safely</div>

    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>

    <div class="status-list">
        <div class="status-item" id="s1"><span class="status-dot"></span>Revoking session token</div>
        <div class="status-item" id="s2"><span class="status-dot"></span>Flushing local cache</div>
        <div class="status-item" id="s3"><span class="status-dot"></span>Clearing exam state</div>
        <div class="status-item" id="s4"><span class="status-dot"></span>Redirecting to home</div>
    </div>
</div>

<script>
    // ── Step animation ──────────────────────────────────────
    const steps = ['s1','s2','s3','s4'];
    const delays = [150, 450, 780, 1100];

    delays.forEach((delay, i) => {
        setTimeout(() => {
            const el = document.getElementById(steps[i]);
            el.classList.add('visible');

            // Mark previous as done
            if (i > 0) {
                document.getElementById(steps[i-1]).classList.remove('visible');
                document.getElementById(steps[i-1]).classList.add('done');
            }

            // Mark last as done before redirect
            if (i === steps.length - 1) {
                setTimeout(() => {
                    el.classList.remove('visible');
                    el.classList.add('done');
                }, 400);
            }
        }, delay);
    });

    // ── Security: prevent back button ──────────────────────
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => history.pushState(null, '', location.href));

    // ── Clear caches ────────────────────────────────────────
    if ('caches' in window) {
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
    }

    // ── Redirect ────────────────────────────────────────────
    setTimeout(() => {
        window.location.replace("{{ url_for('home') }}");
    }, 1900);
</script>
</body>
</html>
