<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Out</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            color: #e6eef8;
            position: relative;
        }

        /* Particles */
        .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(45,91,227,0.2);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity:0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity:0; }
        }

        /* Top accent line */
        .top-line {
            position: fixed;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45,91,227,0.4), transparent);
            z-index: 10;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: #111118;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 2.5rem 2.8rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45,91,227,0.4), transparent);
            border-radius: 16px 16px 0 0;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(20px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* Icon */
        .icon-wrap {
            width: 64px; height: 64px;
            margin: 0 auto 1.5rem;
            background: rgba(45,91,227,0.12);
            border: 1px solid rgba(45,91,227,0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .icon-wrap svg {
            width: 26px; height: 26px;
            stroke: #7da4ff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: iconPulse 2s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%,100% { opacity:0.8; transform:scale(1); }
            50%      { opacity:1;   transform:scale(1.08); }
        }

        /* Spinning ring around icon */
        .icon-ring {
            position: absolute;
            inset: -6px;
            border-radius: 20px;
            border: 1.5px solid transparent;
            border-top-color: rgba(45,91,227,0.4);
            border-right-color: rgba(45,91,227,0.15);
            animation: spinRing 1.8s linear infinite;
        }
        @keyframes spinRing { to { transform: rotate(360deg); } }

        /* Title */
        .title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.35rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 0.4rem;
            letter-spacing: -0.01em;
        }
        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 0.82rem;
            margin-bottom: 1.8rem;
        }

        /* Progress bar */
        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2d5be3, #5b8af5);
            border-radius: 99px;
            animation: fillUp 1.6s cubic-bezier(0.4,0,0.2,1) forwards;
        }
        @keyframes fillUp {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 100%; }
        }

        /* Status items */
        .status-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.2);
            padding: 0.45rem 0.75rem;
            border-radius: 8px;
            background: transparent;
            border: 1px solid transparent;
            opacity: 0;
            transform: translateX(-6px);
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .status-item.visible {
            opacity: 1;
            transform: translateX(0);
            color: rgba(255,255,255,0.55);
            border-color: rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
        }
        .status-item.done {
            opacity: 1;
            transform: translateX(0);
            color: #10b981;
            border-color: rgba(16,185,129,0.15);
            background: rgba(16,185,129,0.05);
        }
        .status-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        .status-item.visible .status-dot {
            background: #2d5be3;
            box-shadow: 0 0 6px rgba(45,91,227,0.6);
        }
        .status-item.done .status-dot {
            background: #10b981;
            box-shadow: 0 0 6px rgba(16,185,129,0.6);
        }
        .status-check {
            display: none;
            margin-left: auto;
            color: #10b981;
            font-size: 0.75rem;
        }
        .status-item.done .status-check { display: block; }
    </style>
</head>
<body>

<div class="top-line"></div>
<div class="particles" id="particles"></div>

<div class="card">
    <div class="icon-wrap">
        <div class="icon-ring"></div>
        <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
    </div>

    <div class="title">Session Secured</div>
    <div class="subtitle">Clearing credentials &amp; redirecting you safely</div>

    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>

    <div class="status-list">
        <div class="status-item" id="s1"><span class="status-dot"></span>Revoking session token<span class="status-check">✓</span></div>
        <div class="status-item" id="s2"><span class="status-dot"></span>Flushing local cache<span class="status-check">✓</span></div>
        <div class="status-item" id="s3"><span class="status-dot"></span>Clearing exam state<span class="status-check">✓</span></div>
        <div class="status-item" id="s4"><span class="status-dot"></span>Redirecting to home<span class="status-check">✓</span></div>
    </div>
</div>

<script>
    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 2;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            animation-duration:${Math.random()*8+6}s;
            animation-delay:${Math.random()*5}s;
            opacity:${Math.random()*0.4+0.1};
        `;
        pc.appendChild(p);
    }

    // Steps
    const steps = ['s1','s2','s3','s4'];
    const delays = [150, 480, 820, 1150];
    delays.forEach((delay, i) => {
        setTimeout(() => {
            document.getElementById(steps[i]).classList.add('visible');
            if (i > 0) {
                document.getElementById(steps[i-1]).classList.remove('visible');
                document.getElementById(steps[i-1]).classList.add('done');
            }
            if (i === steps.length - 1) {
                setTimeout(() => {
                    document.getElementById(steps[i]).classList.remove('visible');
                    document.getElementById(steps[i]).classList.add('done');
                }, 400);
            }
        }, delay);
    });

    // Security: prevent back
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => history.pushState(null, '', location.href));

    // Clear caches
    if ('caches' in window) {
        caches.keys().then(names => names.forEach(n => caches.delete(n)));
    }

    // Redirect
    setTimeout(() => {
        window.location.replace("{{ url_for('home') }}");
    }, 1900);
</script>
</body>
</html>
